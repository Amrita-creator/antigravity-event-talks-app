<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Pulse</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation / Logo / Stats -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-container">
                    <i class="fa-solid fa-database logo-icon"></i>
                    <div class="logo-glow"></div>
                </div>
                <div class="brand-text">
                    <h1>BigQuery</h1>
                    <span class="sub-brand">Release Pulse</span>
                </div>
            </div>

            <nav class="filters">
                <div class="nav-title">Filters</div>
                <button class="filter-btn active" data-category="all">
                    <i class="fa-solid fa-list"></i> All Releases
                </button>
                <button class="filter-btn" data-category="Feature">
                    <i class="fa-solid fa-rocket"></i> Features
                    <span class="badge feature-badge" id="count-feature">0</span>
                </button>
                <button class="filter-btn" data-category="Update">
                    <i class="fa-solid fa-wrench"></i> Updates
                    <span class="badge update-badge" id="count-update">0</span>
                </button>
                <button class="filter-btn" data-category="Fix">
                    <i class="fa-solid fa-bug-slash"></i> Bug Fixes
                    <span class="badge fix-badge" id="count-fix">0</span>
                </button>
                <button class="filter-btn" data-category="Deprecation">
                    <i class="fa-solid fa-triangle-exclamation"></i> Deprecations
                    <span class="badge deprecation-badge" id="count-deprecation">0</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <p>Data synced from Official Feed</p>
                <a href="https://docs.cloud.google.com/feeds/bigquery-release-notes.xml" target="_blank" class="feed-link">
                    <i class="fa-solid fa-rss"></i> View Source Feed
                </a>
            </div>
        </aside>

        <!-- Main Content Feed -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-input" placeholder="Search release notes...">
                </div>

                <div class="actions-container">
                    <button id="theme-toggle-btn" class="btn btn-secondary" title="Toggle Light/Dark Theme">
                        <i class="fa-solid fa-sun" id="theme-icon"></i>
                    </button>
                    <button id="export-csv-btn" class="btn btn-secondary">
                        <i class="fa-solid fa-file-csv"></i>
                        <span>Export CSV</span>
                    </button>
                    <button id="refresh-btn" class="btn btn-primary">
                        <i class="fa-solid fa-rotate-right" id="refresh-icon"></i>
                        <span>Refresh Notes</span>
                    </button>
                </div>
            </header>

            <div class="feed-wrapper">
                <div class="feed-header">
                    <h2>Release Feed</h2>
                    <p class="feed-subtitle">Showing <span id="displayed-count">0</span> release updates</p>
                </div>

                <!-- Loader -->
                <div id="loader" class="loader-container">
                    <div class="spinner"></div>
                    <p>Fetching latest release notes...</p>
                </div>

                <!-- Feed Container -->
                <div id="releases-container" class="releases-grid">
                    <!-- Release cards will be inserted here dynamically -->
                </div>
            </div>
        </main>

    </div>
    
    <!-- Preview Modal -->
    <div id="preview-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Release Update & Sharing Preview</h3>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-section">
                    <h4><i class="fa-solid fa-file-invoice"></i> Formatted Update</h4>
                    <div id="modal-release-body" class="modal-preview-box"></div>
                </div>
                <div class="modal-section">
                    <h4><i class="fa-brands fa-x-twitter"></i> Tweet Preview</h4>
                    <div class="mock-tweet-card">
                        <div class="tweet-user-info">
                            <div class="tweet-avatar">
                                <i class="fa-solid fa-database"></i>
                            </div>
                            <div class="tweet-names">
                                <span class="tweet-display-name">BigQuery Pulse</span>
                                <span class="tweet-handle">@BigQueryPulse</span>
                            </div>
                            <i class="fa-brands fa-x-twitter tweet-brand-icon"></i>
                        </div>
                        <div class="tweet-preview-box" id="modal-tweet-text"></div>
                        <div class="tweet-metrics">
                            <span><i class="fa-regular fa-comment"></i> 0</span>
                            <span><i class="fa-solid fa-retweet"></i> 0</span>
                            <span><i class="fa-regular fa-heart"></i> 0</span>
                            <span><i class="fa-regular fa-bookmark"></i> 0</span>
                        </div>
                    </div>
                </div>
                <div class="modal-section">
                    <h4><i class="fa-regular fa-envelope"></i> Email Draft</h4>
                    <textarea id="modal-email-textarea" class="modal-email-box" readonly></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="modal-copy-btn" class="btn btn-secondary">
                    <i class="fa-regular fa-copy"></i> Copy Note
                </button>
                <button id="modal-copy-email-btn" class="btn btn-secondary">
                    <i class="fa-regular fa-envelope"></i> Copy Email
                </button>
                <button id="modal-tweet-btn" class="btn btn-twitter">
                    <i class="fa-brands fa-x-twitter"></i> Post on X
                </button>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="/static/app.js"></script>
</body>
</html>
